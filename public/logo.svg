<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Background circle -->
  <circle cx="90" cy="90" r="88" fill="#FF8C00" opacity="0.1"/>
  <circle cx="90" cy="90" r="85" fill="none" stroke="#FF8C00" stroke-width="2"/>
  
  <!-- Football/Soccer ball -->
  <circle cx="90" cy="90" r="50" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Ball pattern pentagons and hexagons -->
  <g fill="none" stroke="#FFFFFF" stroke-width="1.5">
    <!-- Top pentagon -->
    <polygon points="90,50 106,62 102,80 78,80 74,62"/>
    
    <!-- Middle hexagons -->
    <polygon points="74,80 78,62 102,62 106,80 98,98 82,98"/>
    <polygon points="98,98 106,80 130,92 122,110 90,118 58,110 50,92 74,80"/>
    
    <!-- Bottom pentagons -->
    <polygon points="58,110 50,92 66,82 82,98"/>
    <polygon points="98,98 114,108 122,110"/>
    
    <!-- Center line -->
    <line x1="90" y1="50" x2="90" y2="130" stroke="#FF8C00" stroke-width="2"/>
  </g>
  
  <!-- "EXPRESS FOOT" text arc -->
  <defs>
    <path id="topArc" d="M 30,90 A 60,60 0 0,1 150,90" fill="none"/>
    <path id="bottomArc" d="M 150,90 A 60,60 0 0,1 30,90" fill="none"/>
  </defs>
  
  <text fill="#FF8C00" font-size="14" font-weight="bold" letter-spacing="2">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      EXPRESS FOOT
    </textPath>
  </text>
</svg>
